<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>히츄's 팬아카이브</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#f4f4f6;font-family:'Noto Sans KR',sans-serif;}
  ::-webkit-scrollbar{width:0;height:0;}
  .btn-link{transition:transform .15s,box-shadow .15s;text-decoration:none;display:flex;align-items:center;justify-content:space-between;}
  .btn-link:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.15);}
  .btn-link:active{transform:scale(.97);}
  .fade{animation:fadeUp .3s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .snap-scroll{scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;}
  .snap-item{scroll-snap-align:start;}
  input,textarea,button{font-family:'Noto Sans KR',sans-serif;}
  button{cursor:pointer;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Utilities ──────────────────────────────────────────────────────────────
async function sha256(msg) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function getWeekDates() {
  const today = new Date();
  const dow = today.getDay();
  const mon = new Date(today);
  mon.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
  mon.setHours(0,0,0,0);
  return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}
function toDS(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function fmtTime(t) {
  const [h,m] = t.split(":").map(Number);
  const ap = h < 12 ? "AM" : "PM";
  return `${h%12||12}${m?":"+String(m).padStart(2,"0"):""}${ap}`;
}
async function compressImg(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = e => {
      const img = new Image();
      img.onload = () => {
        const ratio = Math.min(1000/img.width, 1000/img.height, 1);
        const c = document.createElement("canvas");
        c.width = img.width*ratio; c.height = img.height*ratio;
        c.getContext("2d").drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL("image/jpeg", 0.72));
      };
      img.src = e.target.result;
    };
    r.readAsDataURL(file);
  });
}

// localStorage 기반 저장소 (Netlify 호스팅용)
function sGet(k) {
  try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; }
}
function sSet(k, v) {
  try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) { console.error(e); }
}

// ── Constants ──────────────────────────────────────────────────────────────
const P = "#FF4D8D";
const DAYS_KR = ["월","화","수","목","금","토","일"];
const LINKS_DATA = [
  {id:1, label:"틱톡 라이브 채널",    url:"https://www.tiktok.com/@hiimheechuu",                                                                             bg:"#111",    fg:"#fff"},
  {id:2, label:"히츄 개인 링크트리",  url:"https://linktr.ee/hiimheejoo?utm_source=linktree_profile_share&ltsid=4eb859c2-63ca-4dbb-b83f-e6c7c14c1eb9",       bg:"#00C897", fg:"#fff"},
  {id:3, label:"카톡 공지방",         url:"https://open.kakao.com/o/gQpLhLoi",                                                                               bg:"#FAE100", fg:"#2a2a00"},
  {id:4, label:"방송 규칙 (노션)",     url:"https://www.notion.so/33b0a20a04e680c28e46dae1480e09b0?source=copy_link",                                         bg:"#F0F0F0", fg:"#444"},
  {id:5, label:"틱톡 코인 할인 충전", url:"https://www.tiktok.com/coin?rc=M45V3UY8",                                                                          bg:P,         fg:"#fff"},
  {id:6, label:"인스타그램 (츄클립)", url:"https://www.instagram.com/heechuulive_clip/",                                                                      gradient:true,fg:"#fff"},
  {id:7, label:"유튜브 (츄클립)",     url:"https://www.youtube.com/@chuuclip/",                                                                               bg:"#FF0000", fg:"#fff"},
];

// ── Main App ───────────────────────────────────────────────────────────────
function App() {
  const [page, setPage]           = useState("home");
  const [adminIn, setAdminIn]     = useState(false);
  const [schedules, setSchedules] = useState([]);
  const [diary, setDiary]         = useState([]);
  const [feedbacks, setFeedbacks] = useState([]);
  const [pwHash, setPwHash]       = useState("");
  const [loading, setLoading]     = useState(true);
  const [lightbox, setLightbox]   = useState(null);
  const [profileImg, setProfileImg] = useState(null);

  useEffect(() => {
    (async () => {
      const sc = sGet("hc_sched");
      const di = sGet("hc_diary");
      const fb = sGet("hc_fb");
      const pw = sGet("hc_pw");
      const pi = sGet("hc_profileImg");
      if (sc) setSchedules(sc);
      if (di) setDiary(di);
      if (fb) setFeedbacks(fb);
      if (pi) setProfileImg(pi);
      if (pw) { setPwHash(pw); }
      else { const h = await sha256("heechuu2024"); setPwHash(h); sSet("hc_pw", h); }
      setLoading(false);
    })();
  }, []);

  const saveSched      = async v => { setSchedules(v);  sSet("hc_sched", v); };
  const saveDiary      = async v => { setDiary(v);      sSet("hc_diary", v); };
  const saveFb         = async v => { setFeedbacks(v);  sSet("hc_fb", v); };
  const savePw         = async v => { setPwHash(v);     sSet("hc_pw", v); };
  const saveProfileImg = async v => { setProfileImg(v); sSet("hc_profileImg", v); };

  if (loading) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:P,fontSize:18}}>
      🌸 로딩 중...
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#f4f4f6",display:"flex",justifyContent:"center"}}>
      <div style={{width:"100%",maxWidth:480,background:"#fff",minHeight:"100vh",position:"relative",paddingBottom:80,boxShadow:"0 0 60px rgba(0,0,0,0.1)"}}>
        <ProfileHeader profileImg={profileImg}/>
        <div className="fade" key={page}>
          {page==="home"  && <HomePage schedules={schedules} diary={diary} onPhoto={setLightbox}/>}
          {page==="links" && <LinksPage feedbacks={feedbacks} saveFb={saveFb}/>}
          {page==="admin" && (
            adminIn
              ? <AdminDash schedules={schedules} diary={diary} feedbacks={feedbacks}
                  saveSched={saveSched} saveDiary={saveDiary} saveFb={saveFb}
                  savePw={savePw} pwHash={pwHash} profileImg={profileImg}
                  saveProfileImg={saveProfileImg} onLogout={()=>setAdminIn(false)}/>
              : <AdminLogin pwHash={pwHash} onLogin={()=>setAdminIn(true)}/>
          )}
        </div>
        <BottomNav page={page} setPage={setPage}/>
        {lightbox && <Lightbox photo={lightbox} onClose={()=>setLightbox(null)}/>}
      </div>
    </div>
  );
}

// ── Profile Header ─────────────────────────────────────────────────────────
function ProfileHeader({profileImg}) {
  return (
    <div style={{textAlign:"center",padding:"30px 20px 18px",borderBottom:"1px solid #F0F0F0"}}>
      <div style={{width:78,height:78,borderRadius:"50%",margin:"0 auto 12px",background:`linear-gradient(135deg,#FFB6C1,${P})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:38,boxShadow:`0 4px 18px rgba(255,77,141,0.28)`,overflow:"hidden"}}>
        {profileImg
          ? <img src={profileImg} alt="프로필" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
          : "🐱"}
      </div>
      <h1 style={{fontFamily:"'Nunito',sans-serif",fontSize:22,fontWeight:900,background:`linear-gradient(135deg,${P},#FF8CC8)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:4}}>
        히츄's 팬아카이브
      </h1>
      <p style={{fontSize:10,color:"#bbb",letterSpacing:3,textTransform:"uppercase",fontFamily:"'Nunito',sans-serif"}}>OFFICIAL FAN DASHBOARD</p>
    </div>
  );
}

// ── Bottom Nav ─────────────────────────────────────────────────────────────
function BottomNav({page, setPage}) {
  const items=[{id:"home",emoji:"🏠",label:"HOME"},{id:"links",emoji:"🔗",label:"LINKS"},{id:"admin",emoji:"🔐",label:"LOCK"}];
  return (
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#fff",borderTop:"1px solid #F0F0F0",display:"flex",padding:"6px 0 14px",zIndex:200}}>
      {items.map(it=>(
        <button key={it.id} onClick={()=>setPage(it.id)}
          style={{flex:1,border:"none",background:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:page===it.id?P:"#bbb",padding:"4px 0",transition:"color .2s"}}>
          <span style={{fontSize:22}}>{it.emoji}</span>
          <span style={{fontSize:10,fontFamily:"'Nunito',sans-serif",fontWeight:800,letterSpacing:1}}>{it.label}</span>
        </button>
      ))}
    </div>
  );
}

// ── Section Header ─────────────────────────────────────────────────────────
function SH({icon, title}) {
  return (
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
      <span style={{fontSize:17}}>{icon}</span>
      <h2 style={{fontFamily:"'Nunito','Noto Sans KR',sans-serif",fontSize:14,fontWeight:800,color:"#333",letterSpacing:1,textTransform:"uppercase"}}>{title}</h2>
    </div>
  );
}

// ── Home Page ──────────────────────────────────────────────────────────────
function HomePage({schedules, diary, onPhoto}) {
  return (
    <div style={{padding:"24px 18px",display:"flex",flexDirection:"column",gap:28}}>
      <WeeklySchedule schedules={schedules}/>
      <BroadcastDiary diary={diary} onPhoto={onPhoto}/>
    </div>
  );
}

// ── Weekly Schedule ────────────────────────────────────────────────────────
function WeeklySchedule({schedules}) {
  const week   = getWeekDates();
  const today  = toDS(new Date());
  const wDates = week.map(toDS);
  const wSched = schedules.filter(s => wDates.includes(s.date));
  const byDate = {};
  wSched.forEach(s => { if(!byDate[s.date]) byDate[s.date]=[]; byDate[s.date].push(s); });

  return (
    <section>
      <SH icon="📅" title="이번주 방송일정"/>
      <div style={{background:"#FFF5F9",borderRadius:18,padding:16,border:"1px solid #FFE0EE"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:6}}>
          {DAYS_KR.map((d,i) => (
            <div key={i} style={{textAlign:"center",fontSize:11,fontWeight:700,color:i===5?"#4A8FE7":i===6?P:"#999",fontFamily:"'Nunito',sans-serif"}}>{d}</div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
          {week.map((date,i) => {
            const ds = toDS(date);
            const isToday = ds === today;
            const hasSc = !!byDate[ds]?.length;
            return (
              <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"4px 1px"}}>
                <div style={{width:30,height:30,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:isToday?P:hasSc?"#FFE0EE":"transparent",color:isToday?"#fff":i===5?"#4A8FE7":i===6?P:"#333",fontSize:13,fontWeight:isToday?700:500,border:hasSc&&!isToday?`2px solid ${P}`:"none"}}>
                  {date.getDate()}
                </div>
                {hasSc && byDate[ds].map((s,j) => (
                  <span key={j} style={{fontSize:8,color:P,fontWeight:700,fontFamily:"'Nunito',sans-serif",marginTop:2,lineHeight:1}}>{fmtTime(s.time)}</span>
                ))}
              </div>
            );
          })}
        </div>
        {wSched.length > 0 ? (
          <div style={{marginTop:16,display:"flex",flexDirection:"column",gap:8}}>
            {[...wSched].sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time)).map(s => {
              const di = (new Date(s.date+"T00:00:00").getDay()+6)%7;
              return (
                <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,background:"#fff",borderRadius:12,padding:"10px 14px",border:"1px solid #FFE0EE"}}>
                  <span style={{background:P,color:"#fff",fontSize:11,fontWeight:700,padding:"3px 9px",borderRadius:20,fontFamily:"'Nunito',sans-serif",flexShrink:0}}>{fmtTime(s.time)}</span>
                  <span style={{fontSize:13,color:"#444"}}>{DAYS_KR[di]}요일 · {s.title}</span>
                </div>
              );
            })}
          </div>
        ) : (
          <div style={{marginTop:16,textAlign:"center",padding:"14px",color:"#ccc",fontSize:13}}>이번 주 등록된 방송 일정이 없어요 🌸</div>
        )}
      </div>
    </section>
  );
}

// ── Broadcast Diary ────────────────────────────────────────────────────────
function BroadcastDiary({diary, onPhoto}) {
  return (
    <section>
      <SH icon="📷" title="히츄의 방송일기"/>
      {diary.length === 0 ? (
        <div style={{background:"#FFF5F9",borderRadius:18,padding:"40px 20px",textAlign:"center",color:"#ccc",border:"1px solid #FFE0EE"}}>
          <div style={{fontSize:38,marginBottom:8}}>📸</div>
          <p style={{fontSize:13}}>아직 업로드된 사진이 없어요</p>
        </div>
      ) : (
        <>
          <div className="snap-scroll" style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:4}}>
            {diary.map(ph => (
              <div key={ph.id} className="snap-item" onClick={()=>onPhoto(ph)}
                style={{flexShrink:0,width:"calc(50% - 6px)",aspectRatio:"1/1",borderRadius:16,overflow:"hidden",cursor:"pointer",position:"relative",boxShadow:"0 2px 12px rgba(0,0,0,0.1)"}}>
                <img src={ph.dataUrl} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                {ph.caption && (
                  <div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,0.55))",color:"#fff",fontSize:11,padding:"20px 10px 8px",fontWeight:500}}>{ph.caption}</div>
                )}
              </div>
            ))}
          </div>
          {diary.length > 2 && (
            <p style={{textAlign:"center",fontSize:11,color:"#ccc",marginTop:4}}>→ 옆으로 스와이프하면 더 볼 수 있어요</p>
          )}
        </>
      )}
    </section>
  );
}

// ── Links Page ─────────────────────────────────────────────────────────────
function LinksPage({feedbacks, saveFb}) {
  return (
    <div style={{padding:"24px 18px",display:"flex",flexDirection:"column",gap:28}}>
      <section>
        <SH icon="🔗" title="All Links & Info"/>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {LINKS_DATA.map(lk => (
            <a key={lk.id} href={lk.url} target="_blank" rel="noopener noreferrer"
              className="btn-link"
              style={{padding:"14px 18px",borderRadius:50,background:lk.gradient?"linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)":lk.bg,color:lk.fg,fontWeight:600,fontSize:14}}>
              <span>{lk.label}</span>
              <span style={{fontSize:18,opacity:.7}}>›</span>
            </a>
          ))}
        </div>
      </section>
      <AnonFeedback feedbacks={feedbacks} saveFb={saveFb}/>
    </div>
  );
}

// ── Anonymous Feedback ─────────────────────────────────────────────────────
function AnonFeedback({feedbacks, saveFb}) {
  const [txt,  setTxt]  = useState("");
  const [pw,   setPw]   = useState("");
  const [busy, setBusy] = useState(false);
  const [ok,   setOk]   = useState("");
  const [err,  setErr]  = useState("");
  const [delMode, setDelMode] = useState(false);
  const [delId,   setDelId]   = useState("");
  const [delPw,   setDelPw]   = useState("");
  const [delErr,  setDelErr]  = useState("");
  const [delOk,   setDelOk]   = useState("");

  const handleSend = async () => {
    setErr(""); setOk("");
    if (!txt.trim())          { setErr("내용을 입력해주세요"); return; }
    if (!/^\d{6}$/.test(pw)) { setErr("숫자 6자리 비밀번호를 입력해주세요"); return; }
    setBusy(true);
    const pwh = await sha256(pw);
    const id  = uid();
    await saveFb([{id, content:txt.trim(), passwordHash:pwh, timestamp:Date.now()}, ...feedbacks]);
    setTxt(""); setPw("");
    setOk(`✅ 전송 완료! 게시물 번호: ${id} (메모해두세요 — 삭제 시 필요해요)`);
    setTimeout(() => setOk(""), 12000);
    setBusy(false);
  };

  const handleDelete = async () => {
    setDelErr(""); setDelOk("");
    if (!delId.trim())            { setDelErr("게시물 번호를 입력해주세요"); return; }
    if (!/^\d{6}$/.test(delPw)) { setDelErr("숫자 6자리 비밀번호를 입력해주세요"); return; }
    const post = feedbacks.find(f => f.id === delId.trim());
    if (!post) { setDelErr("게시물 번호를 찾을 수 없어요"); return; }
    const h = await sha256(delPw);
    if (h !== post.passwordHash) { setDelErr("비밀번호가 맞지 않아요"); return; }
    await saveFb(feedbacks.filter(f => f.id !== delId.trim()));
    setDelOk("✅ 삭제되었어요!"); setDelId(""); setDelPw("");
    setTimeout(() => { setDelOk(""); setDelMode(false); }, 3000);
  };

  return (
    <section>
      <SH icon="💬" title="익명 건의함"/>
      <div style={{background:"#FFF5F9",borderRadius:18,padding:16,border:"1px solid #FFE0EE"}}>
        <p style={{fontSize:12,color:"#999",marginBottom:12,lineHeight:1.6}}>익명으로 메시지를 보낼 수 있어요.<br/>비밀번호 6자리를 설정하면 나중에 게시물을 삭제할 수 있어요.</p>
        <textarea value={txt} onChange={e=>setTxt(e.target.value)} rows={4} placeholder="메시지를 입력하세요..."
          style={{width:"100%",border:"1px solid #FFD6E7",borderRadius:12,padding:12,fontSize:13,resize:"none",outline:"none",background:"#fff",lineHeight:1.6}}/>
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <input type="password" inputMode="numeric" maxLength={6} value={pw}
            onChange={e=>setPw(e.target.value.replace(/\D/g,"").slice(0,6))}
            placeholder="비밀번호 6자리"
            style={{flex:1,border:"1px solid #FFD6E7",borderRadius:50,padding:"10px 14px",fontSize:13,outline:"none",background:"#fff"}}/>
          <button onClick={handleSend} disabled={busy}
            style={{background:P,color:"#fff",border:"none",borderRadius:50,padding:"10px 20px",fontWeight:700,fontSize:13,letterSpacing:.5}}>
            {busy?"...":"SEND"}
          </button>
        </div>
        {err && <p style={{color:"#FF4D4D",fontSize:12,marginTop:8}}>{err}</p>}
        {ok  && <p style={{color:"#00B87C",fontSize:12,marginTop:8,lineHeight:1.5}}>{ok}</p>}
        <div style={{marginTop:14,borderTop:"1px dashed #FFD6E7",paddingTop:12}}>
          <button onClick={()=>{setDelMode(v=>!v);setDelErr("");setDelOk("");}}
            style={{border:`1px solid ${P}`,background:"transparent",color:P,borderRadius:50,padding:"7px 16px",fontSize:12,fontWeight:700}}>
            {delMode ? "닫기" : "내 글 삭제하기"}
          </button>
          {delMode && (
            <div style={{marginTop:12,display:"flex",flexDirection:"column",gap:8}}>
              <input type="text" value={delId} onChange={e=>setDelId(e.target.value)} placeholder="게시물 번호"
                style={{border:"1px solid #FFD6E7",borderRadius:12,padding:"10px 14px",fontSize:13,outline:"none",background:"#fff"}}/>
              <input type="password" inputMode="numeric" maxLength={6} value={delPw}
                onChange={e=>setDelPw(e.target.value.replace(/\D/g,"").slice(0,6))} placeholder="비밀번호 6자리"
                style={{border:"1px solid #FFD6E7",borderRadius:12,padding:"10px 14px",fontSize:13,outline:"none",background:"#fff"}}/>
              <button onClick={handleDelete}
                style={{background:"#FF4D4D",color:"#fff",border:"none",borderRadius:50,padding:"10px",fontWeight:700,fontSize:13}}>삭제하기</button>
              {delErr && <p style={{color:"#FF4D4D",fontSize:12}}>{delErr}</p>}
              {delOk  && <p style={{color:"#00B87C",fontSize:12}}>{delOk}</p>}
            </div>
          )}
        </div>
        <p style={{marginTop:12,fontSize:11,color:"#ccc",textAlign:"center"}}>총 {feedbacks.length}개의 건의 (관리자만 열람 가능)</p>
      </div>
    </section>
  );
}

// ── Admin Login ────────────────────────────────────────────────────────────
function AdminLogin({pwHash, onLogin}) {
  const [pw,   setPw]   = useState("");
  const [err,  setErr]  = useState("");
  const [busy, setBusy] = useState(false);

  const tryLogin = async () => {
    setErr(""); setBusy(true);
    const h = await sha256(pw);
    if (h === pwHash) { onLogin(); }
    else { setErr("비밀번호가 틀렸어요 🔒"); }
    setBusy(false);
  };

  return (
    <div style={{padding:"60px 32px",textAlign:"center"}}>
      <div style={{fontSize:60,marginBottom:16}}>🔐</div>
      <h2 style={{fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:20,color:"#333",marginBottom:6}}>관리자 전용</h2>
      <p style={{color:"#bbb",fontSize:13,marginBottom:28}}>비밀번호를 입력해주세요</p>
      <input type="password" value={pw} onChange={e=>setPw(e.target.value)}
        onKeyDown={e=>e.key==="Enter"&&tryLogin()} placeholder="••••••••"
        style={{width:"100%",border:"2px solid #FFD6E7",borderRadius:50,padding:"14px 20px",fontSize:18,textAlign:"center",outline:"none",marginBottom:12,letterSpacing:6,background:"#FFF5F9"}}/>
      {err && <p style={{color:"#FF4D4D",fontSize:13,marginBottom:12}}>{err}</p>}
      <button onClick={tryLogin} disabled={busy}
        style={{width:"100%",background:P,color:"#fff",border:"none",borderRadius:50,padding:"14px",fontWeight:800,fontSize:15,boxShadow:`0 4px 18px rgba(255,77,141,0.38)`}}>
        {busy ? "확인 중..." : "로그인"}
      </button>
    </div>
  );
}

// ── Shared Styles ──────────────────────────────────────────────────────────
const IS = {width:"100%",border:"1px solid #FFD6E7",borderRadius:12,padding:"10px 14px",fontSize:13,outline:"none",background:"#fff"};
const PS = {background:P,color:"#fff",border:"none",borderRadius:50,padding:"11px 20px",fontWeight:700,fontSize:13,boxShadow:`0 3px 12px rgba(255,77,141,0.3)`};

// ── Admin Dashboard ────────────────────────────────────────────────────────
function AdminDash({schedules,diary,feedbacks,saveSched,saveDiary,saveFb,savePw,pwHash,profileImg,saveProfileImg,onLogout}) {
  const [tab, setTab] = useState("sched");
  const tabs = [{id:"sched",label:"📅 방송일정"},{id:"diary",label:"📷 방송일기"},{id:"fb",label:"💬 건의함"},{id:"settings",label:"⚙️ 설정"}];
  return (
    <div style={{padding:"20px 18px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <h2 style={{fontFamily:"'Nunito',sans-serif",fontWeight:900,fontSize:18,background:`linear-gradient(135deg,${P},#FF8CC8)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>관리자 모드</h2>
        <button onClick={onLogout}
          style={{border:`1px solid ${P}`,background:"#FFF5F9",color:P,borderRadius:50,padding:"6px 14px",fontSize:12,fontWeight:700}}>로그아웃</button>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:20,overflowX:"auto",paddingBottom:4}}>
        {tabs.map(t => (
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{flexShrink:0,border:"none",borderRadius:50,padding:"8px 16px",background:tab===t.id?P:"#F0F0F0",color:tab===t.id?"#fff":"#555",fontSize:12,fontWeight:700,transition:"all .2s"}}>
            {t.label}
          </button>
        ))}
      </div>
      {tab==="sched"    && <AdminSched schedules={schedules} saveSched={saveSched}/>}
      {tab==="diary"    && <AdminDiary diary={diary} saveDiary={saveDiary}/>}
      {tab==="fb"       && <AdminFb feedbacks={feedbacks} saveFb={saveFb}/>}
      {tab==="settings" && <AdminSettings pwHash={pwHash} savePw={savePw} profileImg={profileImg} saveProfileImg={saveProfileImg}/>}
    </div>
  );
}

// ── Admin: Schedule ────────────────────────────────────────────────────────
function AdminSched({schedules, saveSched}) {
  const [date,  setDate]  = useState("");
  const [time,  setTime]  = useState("");
  const [title, setTitle] = useState("");
  const [err,   setErr]   = useState("");

  const add = async () => {
    if (!date||!time||!title.trim()) { setErr("모든 항목을 입력해주세요"); return; }
    await saveSched([...schedules, {id:uid(), date, time, title:title.trim()}]);
    setDate(""); setTime(""); setTitle(""); setErr("");
  };
  const del = async id => await saveSched(schedules.filter(s => s.id !== id));
  const sorted = [...schedules].sort((a,b) => a.date.localeCompare(b.date)||a.time.localeCompare(b.time));

  return (
    <div>
      <div style={{background:"#FFF5F9",borderRadius:16,padding:16,border:"1px solid #FFE0EE",marginBottom:16}}>
        <h3 style={{fontSize:14,fontWeight:700,color:"#333",marginBottom:12}}>+ 방송 일정 추가</h3>
        <div style={{display:"flex",flexDirection:"column",gap:9}}>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={IS}/>
          <input type="time" value={time} onChange={e=>setTime(e.target.value)} style={IS}/>
          <input type="text" value={title} onChange={e=>setTitle(e.target.value)} placeholder="방송 제목 (예: 정규 방송)" style={IS}/>
        </div>
        {err && <p style={{color:"#FF4D4D",fontSize:12,marginTop:8}}>{err}</p>}
        <button onClick={add} style={{...PS, width:"100%", marginTop:12}}>일정 추가</button>
      </div>
      <h3 style={{fontSize:14,fontWeight:700,color:"#333",marginBottom:10}}>등록된 일정 ({schedules.length}개)</h3>
      {sorted.length === 0
        ? <p style={{color:"#ccc",fontSize:13,textAlign:"center",padding:20}}>등록된 일정이 없어요</p>
        : <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {sorted.map(s => {
              const di = (new Date(s.date+"T00:00:00").getDay()+6)%7;
              return (
                <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,background:"#fff",borderRadius:12,padding:"12px 14px",border:"1px solid #F0F0F0"}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:"#333"}}>{s.date} ({DAYS_KR[di]})</div>
                    <div style={{fontSize:12,color:"#888"}}>{fmtTime(s.time)} · {s.title}</div>
                  </div>
                  <button onClick={()=>del(s.id)} style={{border:"none",background:"#FFE0EE",color:P,borderRadius:50,padding:"5px 12px",fontSize:12,fontWeight:700}}>삭제</button>
                </div>
              );
            })}
          </div>
      }
    </div>
  );
}

// ── Admin: Diary ───────────────────────────────────────────────────────────
function AdminDiary({diary, saveDiary}) {
  const [caption, setCaption] = useState("");
  const [busy,    setBusy]    = useState(false);
  const fileRef = useRef(null);

  const upload = async e => {
    const f = e.target.files[0];
    if (!f) return;
    setBusy(true);
    const dataUrl = await compressImg(f);
    await saveDiary([{id:uid(), dataUrl, caption:caption.trim(), timestamp:Date.now()}, ...diary]);
    setCaption(""); setBusy(false);
    fileRef.current.value = "";
  };
  const del = async id => { if (!confirm("삭제할까요?")) return; await saveDiary(diary.filter(p => p.id !== id)); };

  return (
    <div>
      <div style={{background:"#FFF5F9",borderRadius:16,padding:16,border:"1px solid #FFE0EE",marginBottom:16}}>
        <h3 style={{fontSize:14,fontWeight:700,color:"#333",marginBottom:12}}>+ 사진 업로드</h3>
        <input type="text" value={caption} onChange={e=>setCaption(e.target.value)} placeholder="캡션 (선택)" style={{...IS, marginBottom:10}}/>
        <input type="file" accept="image/*" ref={fileRef} onChange={upload} style={{display:"none"}}/>
        <button onClick={()=>fileRef.current.click()} disabled={busy} style={{...PS, width:"100%"}}>
          {busy ? "업로드 중..." : "📷 사진 선택 & 업로드"}
        </button>
      </div>
      <h3 style={{fontSize:14,fontWeight:700,color:"#333",marginBottom:10}}>업로드된 사진 ({diary.length}개)</h3>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {diary.map(ph => (
          <div key={ph.id} style={{position:"relative",borderRadius:12,overflow:"hidden"}}>
            <img src={ph.dataUrl} alt="" style={{width:"100%",aspectRatio:"1/1",objectFit:"cover",display:"block"}}/>
            {ph.caption && <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(0,0,0,0.5)",color:"#fff",fontSize:10,padding:"4px 8px"}}>{ph.caption}</div>}
            <button onClick={()=>del(ph.id)}
              style={{position:"absolute",top:6,right:6,background:"rgba(0,0,0,0.55)",color:"#fff",border:"none",borderRadius:"50%",width:24,height:24,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>✕</button>
          </div>
        ))}
      </div>
      {diary.length === 0 && <p style={{color:"#ccc",fontSize:13,textAlign:"center",padding:20}}>업로드된 사진이 없어요</p>}
    </div>
  );
}

// ── Admin: Feedbacks ───────────────────────────────────────────────────────
function AdminFb({feedbacks, saveFb}) {
  const del = async id => { if (!confirm("삭제할까요?")) return; await saveFb(feedbacks.filter(f => f.id !== id)); };
  const sorted = [...feedbacks].sort((a,b) => b.timestamp - a.timestamp);
  return (
    <div>
      <h3 style={{fontSize:14,fontWeight:700,color:"#333",marginBottom:12}}>익명 건의함 ({feedbacks.length}개)</h3>
      {sorted.length === 0
        ? <p style={{color:"#ccc",fontSize:13,textAlign:"center",padding:20}}>건의가 없어요</p>
        : <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {sorted.map(f => (
              <div key={f.id} style={{background:"#fff",borderRadius:12,padding:"12px 14px",border:"1px solid #F0F0F0"}}>
                <p style={{fontSize:13,color:"#333",lineHeight:1.6,marginBottom:8}}>{f.content}</p>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <span style={{fontSize:11,color:"#bbb"}}>{new Date(f.timestamp).toLocaleDateString("ko-KR")} {new Date(f.timestamp).toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})}</span>
                    <br/><span style={{fontSize:10,color:"#ddd"}}>ID: {f.id}</span>
                  </div>
                  <button onClick={()=>del(f.id)} style={{border:"none",background:"#FFE0EE",color:P,borderRadius:50,padding:"4px 10px",fontSize:11,fontWeight:700}}>삭제</button>
                </div>
              </div>
            ))}
          </div>
      }
    </div>
  );
}

// ── Admin: Settings ────────────────────────────────────────────────────────
function AdminSettings({pwHash, savePw, profileImg, saveProfileImg}) {
  const [cur,  setCur]  = useState("");
  const [nw,   setNw]   = useState("");
  const [conf, setConf] = useState("");
  const [err,  setErr]  = useState("");
  const [ok,   setOk]   = useState("");
  const [uploading, setUploading] = useState(false);
  const imgRef = useRef(null);

  const uploadProfile = async e => {
    const f = e.target.files[0];
    if (!f) return;
    setUploading(true);
    const dataUrl = await compressImg(f);
    await saveProfileImg(dataUrl);
    setUploading(false);
    imgRef.current.value = "";
  };
  const removeProfile = async () => {
    if (!confirm("프로필 사진을 기본값으로 돌릴까요?")) return;
    await saveProfileImg(null);
  };
  const change = async () => {
    setErr(""); setOk("");
    if (!cur||!nw||!conf)    { setErr("모든 항목을 입력해주세요"); return; }
    if (nw !== conf)          { setErr("새 비밀번호가 일치하지 않아요"); return; }
    if (nw.length < 4)        { setErr("비밀번호는 4자 이상이어야 해요"); return; }
    const storedH = sGet("hc_pw");
    const curH    = await sha256(cur);
    if (curH !== storedH)     { setErr("현재 비밀번호가 틀려요"); return; }
    const newH = await sha256(nw);
    await savePw(newH);
    setOk("✅ 비밀번호가 변경되었어요!"); setCur(""); setNw(""); setConf("");
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{background:"#FFF5F9",borderRadius:16,padding:16,border:"1px solid #FFE0EE"}}>
        <h3 style={{fontSize:14,fontWeight:700,color:"#333",marginBottom:14}}>프로필 사진 변경</h3>
        <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:14}}>
          <div style={{width:64,height:64,borderRadius:"50%",background:`linear-gradient(135deg,#FFB6C1,${P})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,overflow:"hidden",flexShrink:0,boxShadow:`0 3px 12px rgba(255,77,141,0.25)`}}>
            {profileImg ? <img src={profileImg} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/> : "🐱"}
          </div>
          <p style={{fontSize:12,color:"#999",lineHeight:1.6}}>사진을 업로드하면 상단 프로필에 즉시 반영돼요.<br/>정사각형 이미지를 권장해요!</p>
        </div>
        <input type="file" accept="image/*" ref={imgRef} onChange={uploadProfile} style={{display:"none"}}/>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>imgRef.current.click()} disabled={uploading} style={{...PS, flex:1}}>
            {uploading ? "업로드 중..." : "📷 사진 선택"}
          </button>
          {profileImg && (
            <button onClick={removeProfile}
              style={{border:"1px solid #FFD6E7",background:"#fff",color:"#aaa",borderRadius:50,padding:"11px 16px",fontSize:13,fontWeight:700,flexShrink:0}}>기본값</button>
          )}
        </div>
      </div>
      <div style={{background:"#FFF5F9",borderRadius:16,padding:16,border:"1px solid #FFE0EE"}}>
        <h3 style={{fontSize:14,fontWeight:700,color:"#333",marginBottom:12}}>비밀번호 변경</h3>
        <div style={{display:"flex",flexDirection:"column",gap:9}}>
          <input type="password" value={cur}  onChange={e=>setCur(e.target.value)}  placeholder="현재 비밀번호"    style={IS}/>
          <input type="password" value={nw}   onChange={e=>setNw(e.target.value)}   placeholder="새 비밀번호"      style={IS}/>
          <input type="password" value={conf} onChange={e=>setConf(e.target.value)} placeholder="새 비밀번호 확인" style={IS}/>
        </div>
        {err && <p style={{color:"#FF4D4D",fontSize:12,marginTop:8}}>{err}</p>}
        {ok  && <p style={{color:"#00B87C",fontSize:12,marginTop:8}}>{ok}</p>}
        <button onClick={change} style={{...PS, width:"100%", marginTop:12}}>변경하기</button>
      </div>
    </div>
  );
}

// ── Lightbox ───────────────────────────────────────────────────────────────
function Lightbox({photo, onClose}) {
  return (
    <div onClick={onClose}
      style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
      <button onClick={onClose}
        style={{position:"absolute",top:20,right:20,background:"rgba(255,255,255,0.18)",border:"none",color:"#fff",fontSize:22,width:38,height:38,borderRadius:"50%",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
      <img src={photo.dataUrl} alt="" onClick={e=>e.stopPropagation()}
        style={{maxWidth:"100%",maxHeight:"88vh",borderRadius:12,objectFit:"contain"}}/>
      {photo.caption && (
        <p style={{position:"absolute",bottom:28,left:"50%",transform:"translateX(-50%)",color:"#fff",fontSize:13,fontWeight:600,background:"rgba(0,0,0,0.55)",padding:"6px 16px",borderRadius:50,whiteSpace:"nowrap"}}>{photo.caption}</p>
      )}
    </div>
  );
}

// ── Mount ─────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
